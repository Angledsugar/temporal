# Expert Distill: MetaController Self-Supervised Training
# Distills temporal abstraction structure from frozen action expert's residual stream.
# Discovers subtask boundaries (beta_t) without supervision.

# Paths (overridable via CLI args)
expert_checkpoint: "checkpoint/pi05_droid"
data_root: "dataset/droid_100"
output_dir: "checkpoint/expert_distill"

model:
  n_e: 1024                    # action expert width (gemma_300m)
  n_z: 32                      # controller code dimension
  rank: 32                     # low-rank controller U_t = B_t @ A_t
  encoder_hidden: 128          # BiGRU hidden size
  controlled_layer: 9          # mid-depth of 18 layers

data:
  max_length: 256              # max sequence length
  batch_size: 32
  num_workers: 4
  split: "train"

training:
  learning_rate: 1.0e-3
  weight_decay: 0.01
  alpha: 0.05                  # KL weight (rate-distortion tradeoff)
                               # larger = coarser boundaries
                               # smaller = finer boundaries
  max_steps: 200000
  grad_clip: 1.0
  save_every: 5000
  log_every: 100

logging:
  wandb_project: "temporal-expert-distill"
  visualize_beta_every: 1000   # plot beta_t patterns
